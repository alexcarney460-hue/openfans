<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - OpenFans</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: #0a0a0f;
        color: #e4e4e7;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        text-align: center;
        padding: 2rem;
        max-width: 420px;
      }

      .logo {
        font-size: 1.75rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 2.5rem;
      }

      .logo-open {
        color: #e4e4e7;
      }

      .logo-fans {
        color: #00aff0;
      }

      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 1.5rem;
        border-radius: 50%;
        background: rgba(0, 175, 240, 0.1);
        border: 2px solid rgba(0, 175, 240, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon svg {
        width: 36px;
        height: 36px;
        stroke: #00aff0;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        color: #fafafa;
      }

      p {
        color: #a1a1aa;
        font-size: 0.95rem;
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      .btn {
        display: inline-block;
        padding: 0.75rem 2rem;
        background: #00aff0;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 600;
        border: none;
        border-radius: 9999px;
        cursor: pointer;
        transition: background 0.2s ease, transform 0.15s ease;
      }

      .btn:hover {
        background: #009ad6;
        transform: translateY(-1px);
      }

      .btn:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <span class="logo-open">Open</span><span class="logo-fans">Fans</span>
      </div>

      <div class="icon">
        <svg viewBox="0 0 24 24">
          <line x1="1" y1="1" x2="23" y2="23" />
          <path
            d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39"
          />
          <path
            d="M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88"
          />
          <path
            d="M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"
          />
        </svg>
      </div>

      <h1>You're offline</h1>
      <p>
        It looks like you've lost your internet connection. Check your network
        and try again.
      </p>

      <button class="btn" onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
